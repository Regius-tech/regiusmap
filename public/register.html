<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrer bruker - Triflex</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:Poppins,sans-serif;
  background:#001f3f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.register-container {
  background:rgba(2,28,60,0.95);
  padding:40px;
  border-radius:12px;
  width:100%;
  max-width:460px;
  box-shadow:0 4px 15px rgba(0,0,0,0.5);
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.logo {
  width:160px;
  max-height:80px;
  object-fit:contain;
  margin:0 auto 10px auto;
  display:block;
}

input, button {
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  box-sizing:border-box;
  font-size:1rem;
}

input {
  background:#023060;
  color:white;
}

input::placeholder {
  color:#cfcfcf;
}

button {
  background:#0074D9;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:#005fa3;
}

.login-link {
  color:#cfcfcf;
  font-size:0.9rem;
  text-decoration:underline;
  cursor:pointer;
}

.message {
  min-height:22px;
  font-weight:600;
}

.info-box {
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  padding:12px;
  font-size:0.9rem;
  color:#cfcfcf;
  text-align:left;
}

footer {
  font-size:0.8rem;
  color:rgba(255,255,255,0.7);
}
</style>
</head>
<body>

<div class="register-container">
  <img src="/triflex.png" alt="Triflex Logo" class="logo">

  <h2>Opprett bruker</h2>

  <div class="info-box">
    Godkjente e-postdomener:<br>
    @tsoslo.no<br>
    @mtf.no<br>
    @bla-kurer.no
  </div>

  <input type="email" id="email" placeholder="E-post">
  <input type="password" id="password" placeholder="Passord">
  <input type="password" id="confirmPassword" placeholder="Gjenta passord">

  <button id="registerBtn">Opprett bruker</button>

  <div class="message" id="message"></div>

  <div class="login-link" onclick="window.location.href='index.html'">Tilbake til innlogging</div>

  <footer>© Regius Tech</footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { firebaseConfig } from "./firebaseConfig.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const confirmPasswordInput = document.getElementById("confirmPassword");
const registerBtn = document.getElementById("registerBtn");
const message = document.getElementById("message");

const domainMap = {
  "tsoslo.no": {
    company: "tsoslo",
    companyName: "Transportsentralen Oslo"
  },
  "mtf.no": {
    company: "mtf",
    companyName: "Moss Transportforum"
  },
  "bla-kurer.no": {
    company: "blakurer",
    companyName: "Blå Kurér"
  }
};

function getDomain(email) {
  if (!email.includes("@")) return "";
  return email.split("@")[1].toLowerCase().trim();
}

registerBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim().toLowerCase();
  const password = passwordInput.value.trim();
  const confirmPassword = confirmPasswordInput.value.trim();
  const domain = getDomain(email);
  const companyData = domainMap[domain];

  message.textContent = "";
  message.style.color = "#FF4136";

  if (!email || !password || !confirmPassword) {
    message.textContent = "Fyll inn alle feltene.";
    return;
  }

  if (!companyData) {
    message.textContent = "E-postdomenet er ikke godkjent for Triflex.";
    return;
  }

  if (password.length < 6) {
    message.textContent = "Passord må være minst 6 tegn.";
    return;
  }

  if (password !== confirmPassword) {
    message.textContent = "Passordene er ikke like.";
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCredential.user.uid;

    await set(ref(db, "users/" + uid), {
      email,
      company: companyData.company,
      companyName: companyData.companyName,
      role: "user",
      approved: true,
      active: true,
      createdAt: new Date().toISOString()
    });

    message.style.color = "#2ECC40";
    message.textContent = "Bruker opprettet. Sender deg videre...";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);

  } catch (error) {
    console.error(error);
    message.style.color = "#FF4136";

    if (error.code === "auth/email-already-in-use") {
      message.textContent = "E-postadressen er allerede registrert.";
    } else {
      message.textContent = "Kunne ikke opprette bruker.";
    }
  }
});
</script>

</body>
</html>
