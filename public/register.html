<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrer bruker - Triflex</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:Poppins,sans-serif;
  background:#001f3f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  box-sizing:border-box;
}

.register-container {
  background:rgba(2,28,60,0.95);
  padding:40px;
  border-radius:12px;
  width:100%;
  max-width:480px;
  box-shadow:0 4px 15px rgba(0,0,0,0.5);
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.logo {
  width:160px;
  max-height:80px;
  object-fit:contain;
  margin:0 auto 10px auto;
  display:block;
}

h2 {
  margin:0 0 5px 0;
}

input, button {
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  box-sizing:border-box;
  font-size:1rem;
}

input {
  background:#023060;
  color:white;
}

input::placeholder {
  color:#cfcfcf;
}

button {
  background:#0074D9;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:#005fa3;
}

button:disabled {
  opacity:0.6;
  cursor:not-allowed;
}

.login-link {
  color:#cfcfcf;
  font-size:0.9rem;
  text-decoration:underline;
  cursor:pointer;
}

.message {
  min-height:22px;
  font-weight:600;
  line-height:1.4;
}

.info-box {
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  padding:12px;
  font-size:0.9rem;
  color:#cfcfcf;
  text-align:left;
}

.detected-company {
  min-height:18px;
  color:#7FDBFF;
  font-size:0.9rem;
  font-weight:600;
  text-align:left;
}

footer {
  font-size:0.8rem;
  color:rgba(255,255,255,0.7);
}
</style>
</head>
<body>

<div class="register-container">
  <img src="/triflex.png" alt="Triflex Logo" class="logo">

  <h2>Opprett bruker</h2>

  <div class="info-box">
    Godkjente e-postdomener:<br>
    @tsoslo.no<br>
    @mtf.no<br>
    @bla-kurer.no
  </div>

  <input type="text" id="displayName" placeholder="Navn">
  <input type="email" id="email" placeholder="E-post">
  <div class="detected-company" id="detectedCompany"></div>

  <input type="password" id="password" placeholder="Passord">
  <input type="password" id="confirmPassword" placeholder="Gjenta passord">

  <button id="registerBtn">Opprett bruker</button>

  <div class="message" id="message"></div>

  <div class="login-link" onclick="window.location.href='index.html'">Tilbake til innlogging</div>

  <footer>© Regius Tech</footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKqwpql2Yl0kbpUIPrQUYyVd7m1OeH-D8",
  authDomain: "triflex-a08c7.firebaseapp.com",
  projectId: "triflex-a08c7",
  storageBucket: "triflex-a08c7.firebasestorage.app",
  messagingSenderId: "835381689765",
  appId: "1:835381689765:web:e0be4b22e5f35ca1e0bc4c",
  databaseURL: "https://triflex-a08c7-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const displayNameInput = document.getElementById("displayName");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const confirmPasswordInput = document.getElementById("confirmPassword");
const registerBtn = document.getElementById("registerBtn");
const message = document.getElementById("message");
const detectedCompany = document.getElementById("detectedCompany");

const domainMap = {
  "tsoslo.no": {
    company: "Transportsentralen Oslo",
    companyKey: "tsoslo",
    companyName: "Transportsentralen Oslo",
    companyKeys: ["tsoslo", "tsoslobud"]
  },
  "mtf.no": {
    company: "Moss Transportforum",
    companyKey: "mtf",
    companyName: "Moss Transportforum",
    companyKeys: ["mtf"]
  },
  "bla-kurer.no": {
    company: "Blå Kurér",
    companyKey: "blakurer",
    companyName: "Blå Kurér",
    companyKeys: ["blakurer"]
  }
};

function getDomain(email) {
  if (!email.includes("@")) return "";
  return email.split("@")[1].toLowerCase().trim();
}

function showMessage(text, color = "#FF4136") {
  message.style.color = color;
  message.textContent = text;
}

function getCompanyFromEmail(email) {
  const domain = getDomain(email);
  return domainMap[domain] || null;
}

emailInput.addEventListener("input", () => {
  const companyData = getCompanyFromEmail(emailInput.value.trim().toLowerCase());

  detectedCompany.textContent = companyData
    ? `Oppdaget selskap: ${companyData.companyName}`
    : "";
});

async function handleRegister() {
  const displayName = displayNameInput.value.trim();
  const email = emailInput.value.trim().toLowerCase();
  const password = passwordInput.value.trim();
  const confirmPassword = confirmPasswordInput.value.trim();
  const companyData = getCompanyFromEmail(email);

  showMessage("");

  if (!displayName || !email || !password || !confirmPassword) {
    showMessage("Fyll inn navn, e-post og passord.");
    return;
  }

  if (displayName.length < 2) {
    showMessage("Navn må være minst 2 tegn.");
    return;
  }

  if (!companyData) {
    showMessage("E-postdomenet er ikke godkjent for Triflex.");
    return;
  }

  if (password.length < 6) {
    showMessage("Passord må være minst 6 tegn.");
    return;
  }

  if (password !== confirmPassword) {
    showMessage("Passordene er ikke like.");
    return;
  }

  registerBtn.disabled = true;
  registerBtn.textContent = "Oppretter...";

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCredential.user.uid;

    await set(ref(db, "users/" + uid), {
      displayName,
      email,
      company: companyData.company,
      companyKey: companyData.companyKey,
      companyName: companyData.companyName,
      companyKeys: companyData.companyKeys,
      role: "user",
      approved: false,
      active: true,
      createdAt: new Date().toISOString(),
      lastLogin: ""
    });

    await signOut(auth);

    showMessage(
      "Kontoen er opprettet og sendt til godkjenning. Du får tilgang så snart en administrator har godkjent kontoen.",
      "#2ECC40"
    );

    registerBtn.textContent = "Venter på godkjenning...";

    setTimeout(() => {
      window.location.href = "index.html";
    }, 20000);

  } catch (error) {
    console.error("Registreringsfeil:", error);

    if (error.code === "auth/email-already-in-use") {
      showMessage("E-postadressen er allerede registrert.");
    } else if (error.code === "auth/invalid-email") {
      showMessage("Ugyldig e-postadresse.");
    } else if (error.code === "auth/weak-password") {
      showMessage("Passordet er for svakt.");
    } else if (error.code === "auth/operation-not-allowed") {
      showMessage("Registrering med e-post/passord er ikke aktivert i Firebase.");
    } else {
      showMessage("Kunne ikke opprette bruker. Se Console for detaljer.");
    }

    registerBtn.disabled = false;
    registerBtn.textContent = "Opprett bruker";
  }
}

registerBtn.addEventListener("click", handleRegister);

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !registerBtn.disabled) {
    handleRegister();
  }
});
</script>

</body>
</html>
