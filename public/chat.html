<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triflex Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:Poppins,sans-serif;
  background:#001f3f;
  color:white;
}

.container {
  max-width:1100px;
  margin:20px auto;
  padding:20px;
}

.nav-tabs {
  width:100%;
  background:#001f3f;
  text-align:center;
  margin-bottom:20px;
}
.nav-tabs ul {
  list-style:none;
  padding:0;
  margin:0;
  display:inline-flex;
  flex-wrap:wrap;
}
.nav-tabs ul li { margin:0 10px; }
.nav-tabs ul li a {
  display:block;
  padding:12px 20px;
  color:white;
  text-decoration:none;
  font-weight:600;
  border-radius:8px 8px 0 0;
  transition:0.3s;
}
.nav-tabs ul li a:hover,
.nav-tabs ul li.active a { background:#023060; }

h1 {
  text-align:center;
  margin-bottom:20px;
}

.chat-shell {
  background:rgba(2,28,60,0.95);
  border-radius:14px;
  box-shadow:0 4px 15px rgba(0,0,0,0.5);
  overflow:hidden;
}

.chat-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  padding:16px;
  border-bottom:1px solid #072D60;
}

.channel-tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.channel-btn {
  border:none;
  border-radius:8px;
  padding:10px 14px;
  cursor:pointer;
  color:white;
  font-weight:600;
  background:#023060;
}

.channel-btn.active.global {
  background:#0074D9;
}

.channel-btn.active.internal {
  background:#2ECC40;
}

.user-info {
  font-size:0.9rem;
  color:#cfcfcf;
}

.chat-messages {
  height:560px;
  overflow-y:auto;
  padding:16px;
  background:rgba(0,0,0,0.12);
}

.message {
  margin-bottom:14px;
  padding:11px 12px;
  border-radius:10px;
  background:rgba(255,255,255,0.06);
  border-left:4px solid #0074D9;
}

.message.internal {
  border-left-color:#2ECC40;
}

.message.admin {
  background:rgba(255,255,255,0.09);
}

.message-head {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  font-size:0.85rem;
  margin-bottom:5px;
}

.tag {
  font-weight:700;
  font-size:0.78rem;
}

.tag.global {
  color:#7FDBFF;
}

.tag.internal {
  color:#2ECC40;
}

.tag.admin {
  color:#FFDC00;
}

.sender {
  color:#fff;
  font-weight:600;
}

.company {
  color:#cfcfcf;
}

.time {
  color:#9fb3c8;
  margin-left:auto;
}

.message-text {
  white-space:pre-wrap;
  line-height:1.45;
  color:#f2f6ff;
}

.chat-input-area {
  display:flex;
  gap:10px;
  padding:16px;
  border-top:1px solid #072D60;
  background:rgba(2,28,60,0.98);
}

#messageInput {
  flex:1;
  min-height:44px;
  max-height:110px;
  resize:vertical;
  border:none;
  border-radius:10px;
  padding:12px;
  background:#023060;
  color:white;
  font-family:Poppins,sans-serif;
  font-size:1rem;
  box-sizing:border-box;
}

#messageInput::placeholder {
  color:#cfcfcf;
}

#sendBtn {
  min-width:120px;
  border:none;
  border-radius:10px;
  background:#0074D9;
  color:white;
  font-weight:700;
  cursor:pointer;
  padding:0 18px;
}

#sendBtn:hover {
  background:#005fa3;
}

.empty-state {
  color:#cfcfcf;
  text-align:center;
  margin-top:40px;
}

@media (max-width:700px) {
  .chat-messages {
    height:calc(100vh - 330px);
  }

  .chat-input-area {
    flex-direction:column;
  }

  #sendBtn {
    height:44px;
  }

  .time {
    margin-left:0;
  }
}
</style>
</head>
<body>

<nav class="nav-tabs">
  <ul>
    <li><a href="admin.html">Administrer biler</a></li>
    <li><a href="cars.html">Konsernbilpark</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="kart.html">Kart</a></li>
    <li><a href="users.html">Brukere</a></li>
    <li class="active"><a href="chat.html">Chat</a></li>
    <li><a href="#" id="logoutTab">Logg ut</a></li>
  </ul>
</nav>

<div class="container">
  <h1>Triflex Chat</h1>

  <div class="chat-shell">
    <div class="chat-top">
      <div class="channel-tabs">
        <button class="channel-btn global active" id="globalChannelBtn">Konsernchat</button>
        <button class="channel-btn internal" id="internalChannelBtn">Internchat</button>
      </div>
      <div class="user-info" id="userInfo">Laster bruker...</div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="empty-state">Laster meldinger...</div>
    </div>

    <div class="chat-input-area">
      <textarea id="messageInput" placeholder="Skriv melding..."></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, get, push, set, query, orderByChild, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKqwpql2Yl0kbpUIPrQUYyVd7m1OeH-D8",
  authDomain: "triflex-a08c7.firebaseapp.com",
  projectId: "triflex-a08c7",
  storageBucket: "triflex-a08c7.firebasestorage.app",
  messagingSenderId: "835381689765",
  appId: "1:835381689765:web:e0be4b22e5f35ca1e0bc4c",
  databaseURL: "https://triflex-a08c7-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const chatMessages = document.getElementById("chatMessages");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const userInfo = document.getElementById("userInfo");
const globalChannelBtn = document.getElementById("globalChannelBtn");
const internalChannelBtn = document.getElementById("internalChannelBtn");

let currentUserProfile = null;
let currentChannel = "global";
let messagesUnsubscribe = null;

const companyNames = {
  tsoslo: "Transportsentralen Oslo",
  tsoslobud: "TS Oslo Budtjenester",
  mtf: "Moss Transportforum",
  blakurer: "Blå Kurér"
};

function normalizeCompany(company) {
  if (!company) return "";

  const value = String(company).toLowerCase().trim();

  if (value === "tsoslo" || value.includes("transportsentralen oslo")) return "tsoslo";
  if (value === "tsoslobud" || value.includes("ts oslo budtjenester") || value.includes("tsbud")) return "tsoslobud";
  if (value === "mtf" || value.includes("moss transportforum")) return "mtf";
  if (value === "blakurer" || value.includes("blå kurér") || value.includes("bla-kurer") || value.includes("bla kur")) return "blakurer";

  return value;
}

function getAllowedCompanyKeys(userData) {
  if ((userData.role || "user") === "superadmin") return ["all"];

  if (Array.isArray(userData.companyKeys) && userData.companyKeys.length) {
    return userData.companyKeys.map(normalizeCompany).filter(Boolean);
  }

  if (userData.companyKeys && typeof userData.companyKeys === "object") {
    return Object.values(userData.companyKeys).map(normalizeCompany).filter(Boolean);
  }

  const single = normalizeCompany(userData.companyKey || userData.company || "");
  return single ? [single] : [];
}

function companyLabel(key) {
  if (companyNames[key]) return companyNames[key];
  return key || "Ukjent selskap";
}

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function formatTime(value) {
  if (!value) return "";
  const date = new Date(value);
  if (isNaN(date.getTime())) return "";
  return date.toLocaleString("no-NO", {
    day:"2-digit",
    month:"2-digit",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function canSeeMessage(message) {
  if (!currentUserProfile) return false;

  if (message.channel === "global") return true;

  if (currentUserProfile.role === "superadmin") return true;

  const messageCompanyKeys = Array.isArray(message.companyKeys)
    ? message.companyKeys.map(normalizeCompany)
    : [normalizeCompany(message.companyKey || "")];

  return messageCompanyKeys.some(key => currentUserProfile.allowedCompanyKeys.includes(key));
}

function setChannel(channel) {
  currentChannel = channel;

  globalChannelBtn.classList.toggle("active", channel === "global");
  internalChannelBtn.classList.toggle("active", channel === "internal");

  messageInput.placeholder = channel === "global"
    ? "Skriv melding til alle i konsernet..."
    : "Skriv intern melding til ditt/dine selskap...";

  loadMessages();
}

function renderMessages(messages) {
  chatMessages.innerHTML = "";

  const visibleMessages = messages.filter(canSeeMessage);

  if (!visibleMessages.length) {
    chatMessages.innerHTML = `<div class="empty-state">Ingen meldinger i denne kanalen enda.</div>`;
    return;
  }

  visibleMessages.forEach(message => {
    const div = document.createElement("div");
    div.className = `message ${message.channel === "internal" ? "internal" : "global"} ${["admin","superadmin"].includes(message.role) ? "admin" : ""}`;

    const channelLabel = message.channel === "global" ? "KONSERN" : "INTERN";
    const tagClass = message.channel === "global" ? "global" : "internal";
    const roleTag = ["admin", "superadmin"].includes(message.role)
      ? `<span class="tag admin">${message.role === "superadmin" ? "SUPERADMIN" : "ADMIN"}</span>`
      : "";

    const companyText = message.channel === "internal"
      ? (Array.isArray(message.companyKeys)
          ? message.companyKeys.map(companyLabel).join(", ")
          : companyLabel(message.companyKey))
      : "Alle selskaper";

    div.innerHTML = `
      <div class="message-head">
        <span class="tag ${tagClass}">[${channelLabel}]</span>
        ${roleTag}
        <span class="sender">${escapeHtml(message.email || "Ukjent")}</span>
        <span class="company">${escapeHtml(companyText)}</span>
        <span class="time">${formatTime(message.createdAt)}</span>
      </div>
      <div class="message-text">${escapeHtml(message.text)}</div>
    `;

    chatMessages.appendChild(div);
  });

  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function loadMessages() {
  if (!currentUserProfile) return;

  if (messagesUnsubscribe) {
    messagesUnsubscribe();
    messagesUnsubscribe = null;
  }

  chatMessages.innerHTML = `<div class="empty-state">Laster meldinger...</div>`;

  const messagesQuery = query(
    ref(db, "chatMessages"),
    orderByChild("createdAt"),
    limitToLast(150)
  );

  messagesUnsubscribe = onValue(messagesQuery, snapshot => {
    const messages = [];

    if (snapshot.exists()) {
      const data = snapshot.val();

      for (const id in data) {
        const message = data[id];

        if (message.channel !== currentChannel) continue;

        messages.push({
          id,
          ...message
        });
      }
    }

    messages.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
    renderMessages(messages);
  });
}

async function sendMessage() {
  const text = messageInput.value.trim();

  if (!text || !currentUserProfile) return;

  sendBtn.disabled = true;

  try {
    const messageRef = push(ref(db, "chatMessages"));

    const message = {
      channel: currentChannel,
      text,
      uid: currentUserProfile.uid,
      email: currentUserProfile.email,
      role: currentUserProfile.role,
      companyKey: currentUserProfile.primaryCompanyKey,
      companyKeys: currentUserProfile.allowedCompanyKeys,
      companyName: currentUserProfile.companyName,
      createdAt: new Date().toISOString()
    };

    await set(messageRef, message);

    messageInput.value = "";
  } catch (error) {
    console.error("Feil ved sending av melding:", error);
    alert("Kunne ikke sende meldingen.");
  } finally {
    sendBtn.disabled = false;
  }
}

onAuthStateChanged(auth, async user => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const userSnapshot = await get(ref(db, "users/" + user.uid));

  if (!userSnapshot.exists()) {
    await signOut(auth);
    window.location.href = "index.html";
    return;
  }

  const userData = userSnapshot.val();

  if (userData.active === false || userData.approved !== true) {
    await signOut(auth);
    window.location.href = "index.html";
    return;
  }

  const allowedCompanyKeys = getAllowedCompanyKeys(userData);
  const primaryCompanyKey = normalizeCompany(userData.companyKey || userData.company || allowedCompanyKeys[0] || "");

  currentUserProfile = {
    uid: user.uid,
    email: userData.email || user.email || "",
    role: userData.role || "user",
    primaryCompanyKey,
    allowedCompanyKeys,
    companyName: userData.companyName || companyLabel(primaryCompanyKey)
  };

  userInfo.textContent = `${currentUserProfile.email} · ${currentUserProfile.role} · ${allowedCompanyKeys.includes("all") ? "Alle selskap" : allowedCompanyKeys.map(companyLabel).join(", ")}`;

  setChannel("global");
});

globalChannelBtn.addEventListener("click", () => setChannel("global"));
internalChannelBtn.addEventListener("click", () => setChannel("internal"));

sendBtn.addEventListener("click", sendMessage);

messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById("logoutTab").addEventListener("click", () => {
  signOut(auth).then(() => window.location.href = "index.html");
});
</script>

</body>
</html>
