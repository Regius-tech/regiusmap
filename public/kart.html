<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triflex Kart</title>

  <style>
    body {
      font-family: Poppins, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #001f3f;
      overflow: hidden;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .sidebar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 300px;
      background-color: rgba(2, 28, 60, 0.97);
      color: white;
      padding: 80px 20px 20px 20px;
      transform: translateX(-100%);
      transition: transform 0.4s ease;
      box-shadow: 3px 0 15px rgba(0,0,0,0.4);
      z-index: 1001;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .sidebar.open { transform: translateX(0); }

    .menu-toggle {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: #023060;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 1100;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .menu-toggle:hover { background-color: #012448; }

    .sidebar label {
      font-weight: bold;
      font-size: 14px;
      display: block;
      margin-top: 15px;
    }

    .sidebar select,
    .sidebar input[type="checkbox"],
    .sidebar input[type="text"] {
      width: 100%;
      margin-top: 5px;
      padding: 8px;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 14px;
      box-sizing: border-box;
    }

    .active-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 15px;
      font-weight: bold;
      font-size: 14px;
    }

    .active-row span {
      line-height: 26px;
    }

    .filter-help {
      margin-top: 6px;
      color: #cfcfcf;
      font-size: 12px;
      line-height: 1.4;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 26px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #0074D9;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .sidebar .btn-secondary {
      display: block;
      margin-top: 12px;
      text-align: center;
      background-color: #023060;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      padding: 8px 0;
      font-weight: bold;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
      box-sizing: border-box;
    }

    .sidebar .btn-secondary:hover { background-color: #012448; }

    .visible-count,
    .map-status-panel {
      margin-top: 15px;
      background: rgba(255,255,255,0.08);
      padding: 10px;
      border-radius: 8px;
      color: #cfcfcf;
      font-size: 14px;
    }

    .visible-count {
      font-weight: bold;
      text-align: center;
    }

    .map-status-panel strong {
      color: white;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
      box-shadow: 0 0 7px rgba(0,0,0,0.45);
    }

    .status-dot.green { background:#2ECC40; }
    .status-dot.yellow { background:#FFDC00; }
    .status-dot.red { background:#FF4136; }
    .status-dot.gray { background:#8b98a8; }

    .last-refresh {
      margin-top: 8px;
      font-size: 12px;
      color: #9fb3c8;
      line-height: 1.4;
    }

    .info-window {
      background-color: #012040;
      color: #fff;
      padding: 11px 13px;
      border-radius: 10px;
      font-size: 14px;
      font-family: Poppins, sans-serif;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      min-width: 240px;
    }

    .info-window b { color: #FFD700; }

    .position-status-line {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 6px 0;
      padding: 7px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      font-weight: 700;
    }

    .position-fresh { color: #2ECC40; font-weight: bold; }
    .position-old { color: #FFDC00; font-weight: bold; }
    .position-very-old { color: #FF4136; font-weight: bold; }
    .position-unknown { color: #cfcfcf; font-weight: bold; }

    .info-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .info-link {
      display: inline-block;
      background: #023060;
      color: white;
      text-decoration: none;
      border-radius: 7px;
      padding: 7px 9px;
      font-size: 12px;
      font-weight: 700;
    }

    .info-link:hover {
      background: #012448;
    }

    .suggestions {
      background-color: white;
      color: black;
      border-radius: 8px;
      margin-top: 5px;
      max-height: 180px;
      overflow-y: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: none;
    }

    .suggestions div { padding: 8px; cursor: pointer; }
    .suggestions div:hover { background-color: #e0e0e0; }

    .triflex-chat-bubble,
    .triflex-chat-window {
      z-index: 999999 !important;
    }

    .gm-style-iw {
      background-color: #012040 !important;
      box-shadow: none !important;
      padding: 0 !important;
      border-radius: 10px !important;
      max-width: none !important;
    }

    .gm-style-iw-t::after,
    .gm-style-iw-t::before {
      background: none !important;
      display: none !important;
    }

    .gm-style .gm-style-iw-c {
      padding: 0 !important;
      background: #012040 !important;
      box-shadow: none !important;
      border-radius: 10px !important;
    }

    .gm-style .gm-style-iw-d {
      overflow: visible !important;
    }
  </style>
</head>

<body>
  <button class="menu-toggle" id="menuToggle">☰ Meny</button>

  <div class="sidebar" id="sidebar">
    <label for="company-filter">Selskap:</label>
    <select id="company-filter">
      <option value="all">Alle</option>
      <option value="Transportsentralen Oslo">Transportsentralen Oslo</option>
      <option value="Moss Transportforum">Moss Transportforum</option>
      <option value="Blå Kurér">Blå Kurér</option>
      <option value="TS Oslo Budtjenester">TS Oslo Budtjenester</option>
    </select>

    <div class="active-row">
      <span>Kun aktive i dag</span>
      <label class="switch">
        <input type="checkbox" id="activeToday" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="filter-help">
      Skru av for å vise alle deltakende biler med siste kjente posisjon, også eldre posisjoner.
    </div>

    <label for="vehicleSearch">Søk kjøretøy:</label>
    <input type="text" id="vehicleSearch" placeholder="Søk navn, nummer eller ID...">
    <div id="vehicleSuggestions" class="suggestions"></div>

    <label for="typeSearch">Søk biltype:</label>
    <input type="text" id="typeSearch" placeholder="Eks: varebil, lastebil...">
    <div id="typeSuggestions" class="suggestions"></div>

    <label for="placeSearch">Søk sted/adresse:</label>
    <input type="text" id="placeSearch" placeholder="Søk etter adresse...">

    <div class="active-row">
      <span>Mørk modus</span>
      <label class="switch">
        <input type="checkbox" id="themeSwitch" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="visible-count" id="visibleCount">Synlige biler: 0</div>

    <div class="map-status-panel">
      <strong>Posisjonsstatus</strong>
      <div class="status-grid">
        <div class="status-row">
          <span class="status-left"><span class="status-dot green"></span>Oppdatert</span>
          <span id="freshCount">0</span>
        </div>
        <div class="status-row">
          <span class="status-left"><span class="status-dot yellow"></span>Eldre enn 2 timer</span>
          <span id="oldCount">0</span>
        </div>
        <div class="status-row">
          <span class="status-left"><span class="status-dot red"></span>Eldre enn 24 timer</span>
          <span id="veryOldCount">0</span>
        </div>
      </div>
      <div class="last-refresh" id="lastRefresh">Sist oppdatert: -</div>
    </div>

    <button class="btn-secondary" id="fitMarkersBtn">Vis alle synlige biler</button>
    <button class="btn-secondary" id="resetFiltersBtn">Nullstill filter</button>

    <a class="btn-secondary" href="admin.html">Administrer biler</a>
    <a class="btn-secondary" href="cars.html">Bilpark</a>
    <a class="btn-secondary" href="dashboard.html">Dashboard</a>
    <a class="btn-secondary" href="users.html">Brukere</a>
  </div>

  <div id="map"></div>

  <script>
    let map, darkMode = true;
    let markers = {};
    let vehicleData = [];
    let activeInfoWindow = null;
    let visibleMarkerIds = [];

    const darkStyle = [
      { elementType: "geometry", stylers: [{ color: "#1d2c4d" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#8ec3b9" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#1a3646" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#0e1626" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#304a7d" }] },
      { featureType: "poi", elementType: "geometry", stylers: [{ color: "#283d6a" }] },
      { featureType: "landscape.natural", elementType: "geometry", stylers: [{ color: "#023e58" }] }
    ];

    const companyColors = {
      "Transportsentralen Oslo": "#ffffff",
      "Blå Kurér": "#FFD700",
      "Moss Transportforum": ["#00008b", "#8b0000"],
      "TS Oslo Budtjenester": "#004080"
    };

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 59.9139, lng: 10.7522 },
        zoom: 10,
        styles: darkMode ? darkStyle : [],
        mapTypeControl: false,
        fullscreenControl: true
      });

      document.getElementById("themeSwitch").addEventListener("change", () => {
        darkMode = document.getElementById("themeSwitch").checked;
        map.setOptions({ styles: darkMode ? darkStyle : [] });
      });

      document.getElementById("menuToggle").addEventListener("click", (e) => {
        e.stopPropagation();
        document.getElementById("sidebar").classList.toggle("open");
      });

      document.getElementById("sidebar").addEventListener("click", (e) => {
        e.stopPropagation();
      });

      document.addEventListener("click", () => {
        document.getElementById("sidebar").classList.remove("open");
        hideSuggestions();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          document.getElementById("sidebar").classList.remove("open");
          hideSuggestions();

          if (activeInfoWindow) {
            activeInfoWindow.close();
            activeInfoWindow = null;
          }
        }
      });

      loadPositions();

      document.getElementById("company-filter").addEventListener("change", loadPositions);
      document.getElementById("activeToday").addEventListener("change", loadPositions);
      document.getElementById("fitMarkersBtn").addEventListener("click", fitVisibleMarkers);
      document.getElementById("resetFiltersBtn").addEventListener("click", resetFilters);

      setInterval(loadPositions, 10000);

      const placeInput = document.getElementById("placeSearch");
      const autocomplete = new google.maps.places.Autocomplete(placeInput);
      autocomplete.bindTo("bounds", map);

      autocomplete.addListener("place_changed", () => {
        const place = autocomplete.getPlace();
        if (place.geometry && place.geometry.location) {
          map.panTo(place.geometry.location);
          map.setZoom(14);
        }
      });

      placeInput.addEventListener("keydown", async (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          const geocoder = new google.maps.Geocoder();
          geocoder.geocode({ address: placeInput.value }, (results, status) => {
            if (status === "OK" && results[0]) {
              map.panTo(results[0].geometry.location);
              map.setZoom(14);
            }
          });
        }
      });

      document.getElementById("vehicleSearch").addEventListener("input", showVehicleSuggestions);
      document.getElementById("typeSearch").addEventListener("input", showTypeSuggestions);
    }

    function hideSuggestions() {
      document.getElementById("vehicleSuggestions").style.display = "none";
      document.getElementById("typeSuggestions").style.display = "none";
    }

    function updateVisibleCount() {
      document.getElementById("visibleCount").textContent = `Synlige biler: ${visibleMarkerIds.length}`;
    }

    function updateStatusSummary(filteredVehicles) {
      let fresh = 0;
      let old = 0;
      let veryOld = 0;

      filteredVehicles.forEach(v => {
        const status = getPositionStatus(v.time);
        if (status.level === "fresh") fresh++;
        else if (status.level === "old") old++;
        else veryOld++;
      });

      document.getElementById("freshCount").textContent = fresh;
      document.getElementById("oldCount").textContent = old;
      document.getElementById("veryOldCount").textContent = veryOld;
      document.getElementById("lastRefresh").textContent = `Sist oppdatert: ${formatTimestamp(new Date().toISOString())}`;
    }

    function resetFilters() {
      document.getElementById("company-filter").value = "all";
      document.getElementById("activeToday").checked = true;
      document.getElementById("vehicleSearch").value = "";
      document.getElementById("typeSearch").value = "";
      document.getElementById("placeSearch").value = "";
      hideSuggestions();
      loadPositions();
    }

    function fitVisibleMarkers() {
      const bounds = new google.maps.LatLngBounds();
      let hasMarkers = false;

      visibleMarkerIds.forEach(id => {
        if (markers[id]) {
          bounds.extend(markers[id].getPosition());
          hasMarkers = true;
        }
      });

      if (hasMarkers) {
        map.fitBounds(bounds);
      }
    }

    function formatTimestamp(timestamp) {
      if (!timestamp) return "Ukjent tidspunkt";

      const date = new Date(timestamp);
      if (isNaN(date.getTime())) return "Ukjent tidspunkt";

      return date.toLocaleString("no-NO", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function getPositionAgeText(timestamp) {
      if (!timestamp) return "Ukjent alder";

      const date = new Date(timestamp);
      if (isNaN(date.getTime())) return "Ukjent alder";

      const diffMs = Date.now() - date.getTime();
      const diffMinutes = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMinutes / 60);
      const diffDays = Math.floor(diffHours / 24);

      if (diffMinutes < 1) return "Akkurat nå";
      if (diffMinutes < 60) return `${diffMinutes} min siden`;
      if (diffHours < 24) return `${diffHours} t siden`;
      return `${diffDays} d siden`;
    }

    function getPositionStatus(timestamp) {
      if (!timestamp) {
        return {
          level: "very-old",
          label: "Ingen posisjon",
          dotClass: "red",
          textClass: "position-very-old"
        };
      }

      const date = new Date(timestamp);

      if (isNaN(date.getTime())) {
        return {
          level: "very-old",
          label: "Ugyldig tidspunkt",
          dotClass: "red",
          textClass: "position-very-old"
        };
      }

      const diffHours = (Date.now() - date.getTime()) / 1000 / 60 / 60;

      if (diffHours <= 2) {
        return {
          level: "fresh",
          label: "Oppdatert",
          dotClass: "green",
          textClass: "position-fresh"
        };
      }

      if (diffHours <= 24) {
        return {
          level: "old",
          label: "Eldre posisjon",
          dotClass: "yellow",
          textClass: "position-old"
        };
      }

      return {
        level: "very-old",
        label: "Gammel posisjon",
        dotClass: "red",
        textClass: "position-very-old"
      };
    }

    function createInfoWindowContent(v) {
      const ageText = getPositionAgeText(v.time);
      const status = getPositionStatus(v.time);
      const mapsLink = v.latitude && v.longitude
        ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(v.latitude + "," + v.longitude)}`
        : "";

      return `<div class="info-window">
                <div class="position-status-line">
                  <span class="status-dot ${status.dotClass}"></span>
                  <span class="${status.textClass}">${status.label} · ${ageText}</span>
                </div>

                <b>ID:</b> ${v.id || "-"}<br>
                <b>Nummer:</b> ${v.number || "-"}<br>
                <b>Navn:</b> ${v.name || "-"}<br>
                <b>Type:</b> ${v.type || "-"}<br>
                <b>Palleplasser:</b> ${v.palleplasser || "-"}<br>
                <b>Dato & tid:</b> ${formatTimestamp(v.time)}<br>
                <b>Aktiv i dag:</b> ${v.isActiveToday ? "Ja" : "Nei"}<br>
                <b>Selskap:</b> ${v.company || "-"}

                <div class="info-actions">
                  ${mapsLink ? `<a class="info-link" href="${mapsLink}" target="_blank" rel="noopener">Åpne i Google Maps</a>` : ""}
                </div>
              </div>`;
    }

    function createPinDataURL(vehicle) {
      return new Promise((resolve) => {
        const canvas = document.createElement("canvas");
        canvas.width = 64;
        canvas.height = 76;

        const ctx = canvas.getContext("2d");
        const color = companyColors[vehicle.company] || "#888";
        const status = getPositionStatus(vehicle.time);

        ctx.fillStyle = Array.isArray(color) ? color[0] : color;
        ctx.beginPath();
        ctx.moveTo(32, 76);
        ctx.lineTo(21, 54);
        ctx.lineTo(43, 54);
        ctx.closePath();
        ctx.fill();

        if (Array.isArray(color)) {
          const grad = ctx.createLinearGradient(0, 0, 64, 0);
          grad.addColorStop(0, color[0]);
          grad.addColorStop(1, color[1]);
          ctx.fillStyle = grad;
        } else {
          ctx.fillStyle = color;
        }

        ctx.beginPath();
        ctx.arc(32, 32, 21, 0, Math.PI * 2);
        ctx.fill();

        if (vehicle.company === "Transportsentralen Oslo") {
          ctx.lineWidth = 4;
          ctx.strokeStyle = "red";
          ctx.beginPath();
          ctx.arc(32, 32, 21, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(48, 17, 7, 0, Math.PI * 2);
        ctx.fillStyle =
          status.dotClass === "green" ? "#2ECC40" :
          status.dotClass === "yellow" ? "#FFDC00" :
          "#FF4136";
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#012040";
        ctx.stroke();

        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = vehicle.logo;

        img.onload = () => {
          ctx.save();
          ctx.beginPath();
          ctx.arc(32, 32, 18, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 14, 14, 36, 36);
          ctx.restore();
          resolve(canvas.toDataURL());
        };

        img.onerror = () => resolve(canvas.toDataURL());
      });
    }

    async function loadPositions() {
      try {
        const response = await fetch("/api/positions");

        if (!response.ok) {
          throw new Error("Kunne ikke hente posisjoner fra API");
        }

        const data = await response.json();
        vehicleData = data;

        const activeToday = document.getElementById("activeToday").checked;
        const selectedCompany = document.getElementById("company-filter").value;

        const filtered = data.filter(v => {
          const matchCompany = selectedCompany === "all" || v.company === selectedCompany;
          const matchActive = !activeToday || v.isActiveToday === true;
          const hasCoordinates = v.latitude && v.longitude;
          const isParticipant = v.isParticipant === true;

          return matchCompany && matchActive && hasCoordinates && isParticipant;
        });

        visibleMarkerIds = filtered.map(v => String(v.id));
        updateVisibleCount();
        updateStatusSummary(filtered);

        for (const v of filtered) {
          const id = String(v.id);
          const pos = { lat: Number(v.latitude), lng: Number(v.longitude) };

          if (markers[id]) {
            markers[id].setPosition(pos);
            markers[id].infoWindow.setContent(createInfoWindowContent(v));

            const iconUrl = await createPinDataURL(v);
            markers[id].setIcon({
              url: iconUrl,
              scaledSize: new google.maps.Size(48, 58)
            });
          } else {
            const iconUrl = await createPinDataURL(v);

            const marker = new google.maps.Marker({
              map,
              position: pos,
              icon: {
                url: iconUrl,
                scaledSize: new google.maps.Size(48, 58)
              },
              title: v.name
            });

            const infoWindow = new google.maps.InfoWindow({
              content: createInfoWindowContent(v)
            });

            marker.infoWindow = infoWindow;

            marker.addListener("click", () => {
              if (activeInfoWindow) activeInfoWindow.close();

              activeInfoWindow = infoWindow;
              infoWindow.open(map, marker);
            });

            markers[id] = marker;
          }
        }

        for (const id in markers) {
          if (!visibleMarkerIds.includes(id)) {
            markers[id].setMap(null);
            delete markers[id];
          }
        }

      } catch (err) {
        console.error("Error loading positions:", err);
      }
    }

    function showVehicleSuggestions(e) {
      const input = e.target.value.toLowerCase();
      const box = document.getElementById("vehicleSuggestions");

      box.innerHTML = "";

      if (input.length < 2) {
        box.style.display = "none";
        return;
      }

      const matches = vehicleData.filter(v =>
        (v.name && v.name.toLowerCase().includes(input)) ||
        (v.number && String(v.number).toLowerCase().includes(input)) ||
        (v.id && String(v.id).toLowerCase().includes(input))
      );

      if (!matches.length) {
        box.style.display = "none";
        return;
      }

      matches.slice(0, 25).forEach(v => {
        const status = getPositionStatus(v.time);
        const d = document.createElement("div");
        d.innerHTML = `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${
          status.dotClass === "green" ? "#2ECC40" :
          status.dotClass === "yellow" ? "#FFDC00" :
          "#FF4136"
        };margin-right:6px;"></span>${v.name} (${v.number || v.id || "-"}) - ${v.company} - ${formatTimestamp(v.time)}`;

        d.onclick = () => {
          box.style.display = "none";
          document.getElementById("vehicleSearch").value = v.name;

          if (markers[v.id]) {
            map.panTo(markers[v.id].getPosition());
            map.setZoom(14);
            google.maps.event.trigger(markers[v.id], "click");
          }
        };

        box.appendChild(d);
      });

      box.style.display = "block";
    }

    function showTypeSuggestions(e) {
      const input = e.target.value.toLowerCase();
      const box = document.getElementById("typeSuggestions");

      box.innerHTML = "";

      if (input.length < 2) {
        box.style.display = "none";
        return;
      }

      const matches = vehicleData.filter(v =>
        v.type && v.type.toLowerCase().includes(input)
      );

      if (!matches.length) {
        box.style.display = "none";
        return;
      }

      matches.slice(0, 25).forEach(v => {
        const status = getPositionStatus(v.time);
        const d = document.createElement("div");
        d.innerHTML = `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${
          status.dotClass === "green" ? "#2ECC40" :
          status.dotClass === "yellow" ? "#FFDC00" :
          "#FF4136"
        };margin-right:6px;"></span>${v.type} - ${v.name} - ${formatTimestamp(v.time)}`;

        d.onclick = () => {
          box.style.display = "none";
          document.getElementById("typeSearch").value = v.type;

          if (markers[v.id]) {
            map.panTo(markers[v.id].getPosition());
            map.setZoom(14);
            google.maps.event.trigger(markers[v.id], "click");
          }
        };

        box.appendChild(d);
      });

      box.style.display = "block";
    }
  </script>

    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtSvAG_uN9QBI0Fi_GOJVIyAjd1JlMvNg&callback=initMap&libraries=places&v=beta">
  </script>

  <script type="module" src="/public/chat-widget.js"></script>
</body>
